<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            width: 500px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .header {
            background: #185FA5;
            min-height: 280px;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .header-overlay {
            position: absolute;
            bottom: 16px;
            left: 16px;
            background: rgba(24,95,165,0.65);
            border-radius: 8px;
            padding: 12px;
            width: 220px;
        }
        .header-overlay p {
            color: #B5D4F4;
            font-size: 12px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .search input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 15px;
            outline: none;
            margin-bottom: 8px;
        }
        .search input::placeholder { color: rgba(255,255,255,0.6); }
        .search button {
            width: 100%;
            padding: 10px 18px;
            border-radius: 8px;
            border: none;
            background: white;
            color: #185FA5;
            font-weight: bold;
            cursor: pointer;
        }
        .body { padding: 24px; }
        .main-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .city { font-size: 13px; color: #888; margin-bottom: 4px; }
        .temp { font-size: 52px; font-weight: 500; line-height: 1; }
        .desc { font-size: 14px; color: #888; margin-top: 6px; }
        .icon img { width: 72px; height: 72px; }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }
        .stat {
            background: #f0f4f8;
            border-radius: 8px;
            padding: 12px;
        }
        .stat p:first-child { font-size: 11px; color: #888; margin-bottom: 4px; }
        .stat p:last-child { font-size: 18px; font-weight: 500; }
        .error { padding: 24px; color: #e24b4a; font-weight: 500; }
@media (max-width: 520px) {
            .card { width: 100%; border-radius: 0; }
            .header { min-height: 220px; }
            .header-overlay { width: 85%; }
            .temp { font-size: 42px; }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="header" {% if photo %}style="background-image: url('{{ photo }}'); background-size: cover; background-position: center;"{% endif %}>
        <div class="header-overlay">
            <p>Weather App</p>
            <div class="search">
                <form method="POST">
                    <input type="text" name="city" placeholder="Enter city...">
                    <input type="text" name="country" placeholder="Country (IE, US, DE...)" list="countries" autocomplete="off">
                    <datalist id="countries">
                      <option value="AU" label="Australia">
                      <option value="AT" label="Austria">
                      <option value="BE" label="Belgium">
                      <option value="BR" label="Brazil">
                      <option value="BG" label="Bulgaria">
                      <option value="CA" label="Canada">
                      <option value="CL" label="Chile">
                      <option value="CN" label="China">
                      <option value="HR" label="Croatia">
                      <option value="CZ" label="Czech Republic">
                      <option value="DK" label="Denmark">
                      <option value="EG" label="Egypt">
                      <option value="FI" label="Finland">
                      <option value="FR" label="France">
                      <option value="DE" label="Germany">
                      <option value="GR" label="Greece">
                      <option value="HU" label="Hungary">
                      <option value="IN" label="India">
                      <option value="IE" label="Ireland">
                      <option value="IT" label="Italy">
                      <option value="JP" label="Japan">
                      <option value="KZ" label="Kazakhstan">
                      <option value="LV" label="Latvia">
                      <option value="LT" label="Lithuania">
                      <option value="MY" label="Malaysia">
                      <option value="MX" label="Mexico">
                      <option value="NL" label="Netherlands">
                      <option value="NZ" label="New Zealand">
                      <option value="NG" label="Nigeria">
                      <option value="NO" label="Norway">
                      <option value="PL" label="Poland">
                      <option value="PT" label="Portugal">
                      <option value="RO" label="Romania">
                      <option value="SA" label="Saudi Arabia">
                      <option value="RS" label="Serbia">
                      <option value="ZA" label="South Africa">
                      <option value="ES" label="Spain">
                      <option value="SE" label="Sweden">
                      <option value="CH" label="Switzerland">
                      <option value="TR" label="Turkey">
                      <option value="UA" label="Ukraine">
                      <option value="GB" label="United Kingdom">
                      <option value="US" label="United States">
                      <option value="VN" label="Vietnam">
                    </datalist>
                    <button type="submit">Search</button>
                </form>
            </div>
        </div>
    </div>
    <div class="body">
        {% if weather %}
            {% if weather.error %}
                <div class="error">City not found</div>
            {% else %}
                <div class="main-info">
                    <div>
                        <p class="city">{{ weather.city }}</p>
                        <p class="temp">{{ weather.temp }}°C</p>
                        <p class="desc">{{ weather.description }}</p>
                    </div>
                    <div class="icon">
                        <img src="https://openweathermap.org/img/wn/{{ weather.icon }}@2x.png">
                    </div>
                </div>
                <div class="stats">
                    <div class="stat">
                        <p>Humidity</p>
                        <p>{{ weather.humidity }}%</p>
                    </div>
                    <div class="stat">
                        <p>Feels like</p>
                        <p>{{ weather.feels_like }}°C</p>
                    </div>
                    <div class="stat">
                        <p>Wind</p>
                        <p>{{ weather.wind }} km/h</p>
                    </div>
                </div>
            {% endif %}
        {% endif %}
    </div>
</div>
</body>
</html>
